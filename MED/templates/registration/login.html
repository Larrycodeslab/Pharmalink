{% extends 'base.html' %}

{% block content %}
<div class="max-w-md mx-auto mt-10 bg-white p-8 rounded-3xl shadow-xl border border-slate-100">
    <div class="text-center mb-8">
        <span class="text-4xl">🔐</span>
        <h1 class="text-2xl font-black text-slate-800 mt-4">Staff Login</h1>
        <p class="text-slate-500 text-sm">Welcome back, Pharmacist/Rider</p>
    </div>

    <form method="post">
        {% csrf_token %}
        
        <div class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Username</label>
                <input type="text" name="username" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
            
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">Password</label>
                <input type="password" name="password" required 
                       class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-blue-500 outline-none">
            </div>
        </div>

        <button type="submit" class="w-full bg-slate-800 text-white py-4 rounded-xl font-bold mt-8 hover:bg-slate-700 transition">
            Sign In
        </button>
    </form>
</div>
{% endblock %}
