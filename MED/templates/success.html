{% extends 'MED/base.html' %}

{% block content %}
<div style="max-width: 500px; margin: 60px auto; text-align: center; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <div style="background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); border: 1px solid #e2e8f0;">
        
        <div style="width: 80px; height: 80px; background: #dcfce7; color: #16a34a; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 24px;">
            <svg style="width: 40px; height: 40px;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>

        <h1 style="color: #1e293b; font-size: 28px; font-weight: 800; margin-bottom: 8px;">Order Confirmed!</h1>
        <p style="color: #64748b; font-size: 16px; margin-bottom: 32px;">Your prescription has been sent to the pharmacy.</p>

        <div style="background: #eff6ff; border: 2px dashed #bfdbfe; padding: 30px; border-radius: 20px; margin-bottom: 32px;">
            <p style="color: #3b82f6; font-size: 12px; font-weight: 800; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px;">Your Delivery Code</p>
            
            <h2 style="font-size: 64px; color: #1e40af; font-weight: 900; margin: 0; letter-spacing: 8px;">
                {{ code }}
            </h2>
            
            <p style="color: #60a5fa; font-size: 11px; margin-top: 12px; font-weight: 600;">DO NOT SHARE THIS CODE UNTIL DELIVERY</p>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px;">
            <a href="{% url 'patient_portal' %}" style="background: #0f172a; color: white; padding: 16px; border-radius: 12px; text-decoration: none; font-weight: 700; transition: 0.3s;">
                Make Another Order
            </a>
            <p style="color: #94a3b8; font-size: 12px;">A copy of this order has been saved to our database.</p>
        </div>
    </div>
</div>
{% endblock %}
